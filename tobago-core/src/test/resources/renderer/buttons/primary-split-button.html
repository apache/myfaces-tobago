<tobago-buttons id='splitButtonsPrimary' class='btn-group tobago-auto-spacing' role='group'>
<button type='button' id='main' name='main' class='tobago-button btn btn-primary'><tobago-behavior event='click' client-id='main'></tobago-behavior><span>Primary</span></button>
<tobago-dropdown id='split' class='dropdown btn-group'>
<button type='button' id='split::command' name='split' aria-expanded='false' class='tobago-button btn btn-primary dropdown-toggle dropdown-toggle-split'><tobago-behavior event='click' client-id='split' field-id='split::command' omit='omit'></tobago-behavior></button>
<div class='tobago-dropdown-menu' aria-labelledby='split::command' name='split' data-tobago-for='split'>
<button type='button' id='entry1' name='entry1' class='tobago-link dropdown-item'><tobago-behavior event='click' client-id='entry1'></tobago-behavior><span>Entry 1</span></button>
<button type='button' id='entry2' name='entry2' class='tobago-link dropdown-item'><tobago-behavior event='click' client-id='entry2'></tobago-behavior><span>Entry 2</span></button>
<button type='button' id='entry3' name='entry3' class='tobago-link dropdown-item'><tobago-behavior event='click' client-id='entry3'></tobago-behavior><span>Entry 3</span></button></div></tobago-dropdown></tobago-buttons>
