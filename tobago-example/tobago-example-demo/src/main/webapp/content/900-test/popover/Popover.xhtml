<ui:composition template="/main.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:tc="http://myfaces.apache.org/tobago/component"
                xmlns:ui="jakarta.faces.facelets">

  <tc:section label="Popover events">
    <tc:script file="stop-show-event.js" rendered="#{testPopoverController.cancelEvent eq 'tobago.popover.show'}"/>
    <tc:script file="stop-hide-event.js" rendered="#{testPopoverController.cancelEvent eq 'tobago.popover.hide'}"/>

    <tc:selectOneRadio id="selectEventPrevention" label="Cancelable event" labelLayout="top"
                       value="#{testPopoverController.cancelEvent}">
      <f:selectItems value="#{testPopoverController.cancelableEvents}"/>
      <tc:event/>
    </tc:selectOneRadio>

    <tc:panel id="counter">
      <p>Counter</p>
      <tc:flexLayout columns="auto">
        <tc:out id="showCounter" label="show" value="#{testPopoverController.show}" labelLayout="top"/>
        <tc:out id="shownCounter" label="shown" value="#{testPopoverController.shown}" labelLayout="top"/>
        <tc:out id="hideCounter" label="hide" value="#{testPopoverController.hide}" labelLayout="top"/>
        <tc:out id="hiddenCounter" label="hidden" value="#{testPopoverController.hidden}" labelLayout="top"/>
      </tc:flexLayout>
    </tc:panel>

    <tc:button id="focusPopover" label="focus Popover" omit="true">
      <f:facet name="popover">
        <tc:popover label="Popover title" value="Popover content"/>
      </f:facet>
      <f:ajax event="tobago.popover.show" render="counter" listener="#{testPopoverController.increaseShow}"/>
      <f:ajax event="tobago.popover.shown" render="counter" listener="#{testPopoverController.increaseShown}"/>
      <f:ajax event="tobago.popover.hide" render="counter" listener="#{testPopoverController.increaseHide}"/>
      <f:ajax event="tobago.popover.hidden" render="counter" listener="#{testPopoverController.increaseHidden}"/>
    </tc:button>

    <tc:button id="clickPopover" label="click Popover" omit="true">
      <f:facet name="popover">
        <tc:popover label="Popover title" value="Popover content" trigger="click"/>
      </f:facet>
      <f:ajax event="tobago.popover.show" render="counter" listener="#{testPopoverController.increaseShow}"/>
      <f:ajax event="tobago.popover.shown" render="counter" listener="#{testPopoverController.increaseShown}"/>
      <f:ajax event="tobago.popover.hide" render="counter" listener="#{testPopoverController.increaseHide}"/>
      <f:ajax event="tobago.popover.hidden" render="counter" listener="#{testPopoverController.increaseHidden}"/>
    </tc:button>

    <tc:button id="hoverPopover" label="hover Popover" omit="true">
      <f:facet name="popover">
        <tc:popover label="Popover title" value="Popover content" trigger="hover"/>
      </f:facet>
      <f:ajax event="tobago.popover.show" render="counter" listener="#{testPopoverController.increaseShow}"/>
      <f:ajax event="tobago.popover.shown" render="counter" listener="#{testPopoverController.increaseShown}"/>
      <f:ajax event="tobago.popover.hide" render="counter" listener="#{testPopoverController.increaseHide}"/>
      <f:ajax event="tobago.popover.hidden" render="counter" listener="#{testPopoverController.increaseHidden}"/>
    </tc:button>
  </tc:section>

  <tc:section label="Attribute: helpTrigger=hover">
    <tc:date id="date" help="Help content" helpTrigger="hover"/>
    <tc:file id="file" help="Help content" helpTrigger="hover"/>
    <tc:in id="in" help="Help content" helpTrigger="hover"/>
    <tc:range id="range" help="Help content" helpTrigger="hover"/>
    <tc:selectBooleanCheckbox id="selectBooleanCheckbox" help="Help content" helpTrigger="hover"/>
    <tc:selectBooleanToggle id="selectBooleanToggle" help="Help content" helpTrigger="hover"/>
    <tc:selectManyCheckbox id="selectManyCheckbox" help="Help content" helpTrigger="hover"/>
    <tc:selectManyList id="selectManyList" help="Help content" helpTrigger="hover"/>
    <tc:selectManyListbox id="selectManyListbox" help="Help content" helpTrigger="hover"/>
    <tc:selectManyShuttle id="selectManyShuttle" help="Help content" helpTrigger="hover"/>
    <tc:selectOneChoice id="selectOneChoice" help="Help content" helpTrigger="hover"/>
    <tc:selectOneList id="selectOneList" help="Help content" helpTrigger="hover"/>
    <tc:selectOneListbox id="selectOneListbox" help="Help content" helpTrigger="hover"/>
    <tc:selectOneRadio id="selectOneRadio" help="Help content" helpTrigger="hover"/>
    <tc:stars id="stars" help="Help content" helpTrigger="hover"/>
    <tc:textarea id="textarea" help="Help content" helpTrigger="hover"/>
  </tc:section>
</ui:composition>
