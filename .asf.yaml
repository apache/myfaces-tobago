# see https://github.com/apache/infrastructure-asfyaml
github:
  description: "Apache MyFaces Tobago"
  homepage: https://myfaces.apache.org
  labels:
    - java
    - web-framework
    - javaee
    - myfaces
    - jsf
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: true
  autolink_jira:
    - TOBAGO
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
          - "tobago-*.x"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
notifications:
  commits: commits@myfaces.apache.org
  issues: dev@myfaces.apache.org
  pullrequests: dev@myfaces.apache.org
  jira_options: link label
